<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">📊</div>
            <h1>CRM Admin Login</h1>
            <p class="login-subtitle">Client Lead Management System</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required
                        autocomplete="current-password">
                </div>
                <p id="error-msg" class="error-msg"></p>
                <button type="submit" class="btn-primary" id="login-btn">Login</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
